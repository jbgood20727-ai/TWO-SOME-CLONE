<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap"
      rel="stylesheet"
    />
    <title>투썸 클론</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="output.css" />
  </head>

  <body>
    <h1 class="text-3xl font-bold underline">Hello world!</h1>
    <div class="wrap">
      <!-- 상단 -->
      <div class="top">
        <div>☰</div>
        <div class="logo">A TWOSOME PLACE</div>
        <div>ⓘ</div>
      </div>

      <!-- 배너 -->
      <div class="main-banner">
        <div class="banner-box">
          <p>투썸 이벤트</p>
          <h2>조각 케이크 구매 시<br />아메리카노 무료</h2>
          <span>4.7 ~ 4.30</span>
        </div>
        <div class="count">3/9</div>
      </div>

      <!-- 로그인 -->
      <div class="login-box">
        <p class="small">투썸하트 앱</p>
        <b>회원가입 / 로그인 하기</b>
      </div>

      <!-- 상품 -->
      <div class="section">
        <div class="sec-top">
          <span>투썸을 선물하세요!</span>
          <span class="more">더보기</span>
        </div>

        <div class="item-wrap">
          <div class="item">
            <img ="" />
            <p>스트로베리 케이크</p>
            <span>39,000원</span>
          </div>

          <div class="item">
            <img
              src="https://cdn.pixabay.com/photo/2016/11/29/03/53/cake-1869227_1280.jpg"
            />
            <p>초코 케이크</p>
            <span>45,000원</span>
          </div>

          <div class="item">
            <img
              src="https://cdn.pixabay.com/photo/2018/03/18/18/24/cake-3235929_1280.jpg"
            />
            <p>치즈 케이크</p>
            <span>42,000원</span>
          </div>
        </div>
      </div>

      <!-- 인기 -->
      <div class="section">
        <p class="title2">가장 많이 주문한 케이크</p>

        <div class="item-wrap">
          <div class="item">
            <img
              src="https://cdn.pixabay.com/photo/2017/05/07/08/56/pancakes-2291908_1280.jpg"
            />
          </div>
          <div class="item">
            <img
              src="https://cdn.pixabay.com/photo/2016/11/29/03/53/cake-1869227_1280.jpg"
            />
          </div>
          <div class="item">
            <img
              src="https://cdn.pixabay.com/photo/2018/03/18/18/24/cake-3235929_1280.jpg"
            />
          </div>
        </div>
      </div>

      <!-- 하단 -->
      <div class="bottom">
        <div>주문</div>
        <div>오더</div>
        <div>예약</div>
        <div>선물</div>
        <div class="active">이벤트</div>
      </div>
    </div>
  </body>
</html>
