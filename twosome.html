<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">

<title>로그인</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Noto Sans KR', sans-serif;
}

body {
  background: #f5f5f5;
}

.header {
  text-align: center;
  padding: 15px;
  border-bottom: 1px solid #e2d6d6;
  position: relative;
  background: #fff;
}

.top-icons {
  position: absolute;
  left: 10px;
  top: 15px;
  font-size: 20px;
}

.title {
  font-weight: bold;
}

.brand {
  text-align: center;
  margin: 30px 0;
  font-weight: bold;
  font-size: 18px;
  letter-spacing: 1px;
}

.form {
  padding: 20px;
  background: #fff;
}

.input-box {
  border-bottom: 1px solid #fcf8f8;
  padding: 15px 0;
}

.input-box input {
  border: none;
  width: 100%;
  font-size: 14px;
  outline: none;
}


.captcha-container {
  display: flex;
  margin-top: 10px;
  border: 1px solid #fcfcfc;
}

.captcha {
  flex: 3;
}

.captcha img {
  width: 100%;
  height: 80px;
  display: block;
  object-fit: fill;
}

.captcha-buttons {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #faf8f8;
}

.captcha-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #333;
  text-decoration: none;
  background: #fff;
  cursor: pointer;
}

.captcha-btn:first-child {
  border-bottom: 1px solid #ccc;
}

.login-btn {
  background: #000;
  color: #fff;
  padding: 15px;
  text-align: center;
  margin-top: 20px;
  cursor: pointer;
}

.sub-links {
  text-align: center;
  margin: 15px 0;
  font-size: 12px;
  color: #f3eeee;
}

.sub-links a {
  text-decoration: none;
  color: #ece9e9;
}

.sns {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px 0;
}

.sns a {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  font-weight: bold;
}

.kakao {
  background: #FEE500;
  color: #3B1E1E;
}

.apple {
  background: #000;
  color: #fff;
}


.apple img {
  width: 24px;
  filter: invert(1); 
}

.join-container {
  background: #fff;
  padding-bottom: 30px;
}

.join-text {
  text-align: left;
  padding: 0 20px;
  font-size: 12px;
}

.join-text span {
  color: #d63384;
  font-weight: bold;
}

.join {
  border: 1px solid #000;
  padding: 15px;
  text-align: center;
  margin: 10px 20px;
  cursor: pointer;
  background: #fff;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
  <div class="top-icons">← 🏠</div>
  <div class="title">로그인</div>
</div>

<div class="brand">A TWOSOME PLACE</div>

<div class="form">

  <div class="input-box">
    <input type="text" placeholder="아이디 입력">
  </div>

  <div class="input-box">
    <input type="password" placeholder="비밀번호 입력">
  </div>

  <p style="font-size:12px; margin-top:15px; color:#333;">
    정보 보호를 위해 아이디, 비밀번호와 함께 자동 입력 방지 문자를 입력해 주세요.
  </p>

  <div class="captcha-container">
    <div class="captcha">
      <img src="ab.png" alt="242803">
    </div>
    <div class="captcha-buttons">
      <div class="captcha-btn">새로고침 ↻</div>
      <div class="captcha-btn">음성듣기 🔊</div>
    </div>
  </div>

  <div class="input-box">
    <input type="text" placeholder="자동 입력 방지 문자 입력">
  </div>

  <div class="login-btn" onclick="alert('로그인 시도')">로그인</div>

  <div class="sub-links">
    <a href="#">아이디 찾기</a> |
    <a href="#">비밀번호 찾기</a>
  </div>

  <div class="sns">
    <a href="https://accounts.kakao.com/login" class="kakao">
      <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="30" alt="K">
    </a>
    <a href="https://appleid.apple.com" class="apple">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="A">
    </a>
  </div>

</div>

<div class="join-container">
  <div class="join-text">
    <span>투썸하트</span> 앱이 처음이신가요?
  </div>
  <div class="join" onclick="location.href='https://www.twosome.co.kr'">
    회원가입하기
  </div>
</div>

</body>
</html>
